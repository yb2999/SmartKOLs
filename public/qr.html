<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>扫码预览配色</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, sans-serif; }
    .card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 40px; text-align: center; }
    h1 { color: #fff; font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    p { color: #555; font-size: 13px; margin-bottom: 28px; }
    #qrcode { display: flex; justify-content: center; margin-bottom: 24px; }
    #qrcode canvas, #qrcode img { border-radius: 12px; }
    .url { color: #444; font-size: 11px; word-break: break-all; }
  </style>
</head>
<body>
  <div class="card">
    <h1>扫码查看配色方案</h1>
    <p>用手机扫描下方二维码</p>
    <div id="qrcode"></div>
    <div class="url">http://192.168.0.220:3001/color-preview.html</div>
  </div>
  <script>
    new QRCode(document.getElementById("qrcode"), {
      text: "http://192.168.0.220:3001/color-preview.html",
      width: 220,
      height: 220,
      colorDark: "#ffffff",
      colorLight: "#111111",
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>
</body>
</html>
